<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eat & Burn</title>
    <link rel="stylesheet" href="static/css/main.css">
</head>
<body>

<div id="loading" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,218,185,.92); z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
    <div class="spinner" style="width:60px; height:60px; border:6px solid #eee; border-top:6px solid #FF8C00; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <h2 style="color:#FF4500; margin-top:15px; font-family:sans-serif;">🔥 QUEMANDO GRASA...</h2>
</div>

<header>
    <img src="img/logo.png" class="logo-principal" alt="Eat & Burn">
    <h1 class="titulo-principal"><span class="negro">EAT</span> <span class="naranja-neon">& BURN</span></h1>
</header>

<main class="wrapper">
    <div id="pantalla-inicio">
        <p class="texto-gris" style="font-style: italic; margin-bottom: 25px;">Tu nutrición inteligente, a un solo clic.</p>
        <button class="btn-naranja" onclick="irLogin()">👤 USUARIO</button>
        <button class="btn-naranja" onclick="irInvitado()">🕶️ INVITADO</button>
        <p class="texto-gris" style="margin-top: 25px;">
            ¿No tienes cuenta? <button onclick="irRegistro()" class="link-morado-bold" style="background:none; border:none; cursor:pointer; font-size:inherit;">Regístrate</button>
        </p>
    </div>

    <div id="pantalla-login" class="oculto" style="display:none;">
        <h2 class="texto-morado-acento">Iniciar Sesión</h2>
        <form onsubmit="hacerLogin(event)" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="login-username" placeholder="Usuario" class="input-estilo" required>
            <input type="password" id="login-password" placeholder="Contraseña" class="input-estilo" required>
            <button type="submit" class="btn-naranja">ENTRAR</button>
        </form>
        <p id="login-error" class="error-msg" style="display:none; color:red;"></p>
        <button onclick="irInicio()" class="texto-gris" style="background:none; border:none; margin-top:20px;">← Volver</button>
    </div>

    <div id="pantalla-registro" class="oculto" style="display:none;">
        <h2 class="texto-morado-acento">Crear Cuenta</h2>
        <form onsubmit="hacerRegistro(event)" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <input type="text" id="reg-username" placeholder="Nombre de usuario" class="input-estilo" required>
            <input type="email" id="reg-email" placeholder="Correo electrónico" class="input-estilo" required>
            <input type="password" id="reg-password" placeholder="Contraseña" class="input-estilo" required>
            <button type="submit" class="btn-naranja">REGISTRARME</button>
        </form>
        <button onclick="irInicio()" class="texto-gris" style="background:none; border:none; margin-top:20px;">← Volver</button>
    </div>

    <div id="pantalla-analisis" class="oculto" style="display:none;">
        <p class="texto-gris" id="texto-analisis" style="margin-bottom:20px;">Personaliza el cálculo para la IA.</p>
        <form id="bForm" style="width:100%; display:flex; flex-direction:column; align-items:center;">
            <input type="hidden" id="tipo_usuario" value="invitado">
            <select id="sexo" class="input-estilo">
                <option value="">Sexo</option>
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
            </select>
            <input type="number" id="peso" placeholder="Peso (kg)" class="input-estilo">
            <input type="number" id="edad" placeholder="Edad" class="input-estilo">
            
            <input type="file" id="fIn" style="display:none" accept="image/*" onchange="prepararEnvio()">
            <input type="file" id="cIn" style="display:none" accept="image/*" capture="camera" onchange="prepararEnvio()">

            <button type="button" class="btn-naranja" onclick="document.getElementById('cIn').click()">📸 ABRIR CÁMARA</button>
            <button type="button" class="btn-naranja" onclick="document.getElementById('fIn').click()">📎 PEGAR ARCHIVO</button>
        </form>
        <button onclick="cerrarSesion()" class="texto-gris" style="background:none; border:none; margin-top:20px;">← Salir</button>
    </div>
</main>

<footer>
    <p class="texto-morado-footer">Mens Sana in Corpore Sano con la IA</p>
    <p class="copy-style">© 2026 Eat & Burn</p>
</footer>

<style>
@keyframes spin { 
    0% { transform: rotate(0deg); } 
    100% { transform: rotate(360deg); } 
}
</style>

<script>
const BACKEND_URL = "https://eat-backend-production-a004.up.railway.app/analizar";

function mostrarPantalla(id){
    document.getElementById('pantalla-inicio').style.display = 'none';
    document.getElementById('pantalla-login').style.display = 'none';
    document.getElementById('pantalla-registro').style.display = 'none';
    document.getElementById('pantalla-analisis').style.display = 'none';
    document.getElementById(id).style.display = 'block';
}

function irInicio(){ mostrarPantalla('pantalla-inicio'); }
function irLogin(){ mostrarPantalla('pantalla-login'); }
function irRegistro(){ mostrarPantalla('pantalla-registro'); }

function irInvitado(){
    document.getElementById('tipo_usuario').value = 'invitado';
    document.getElementById('texto-analisis').innerText = 'Personaliza el cálculo para la IA.';
    mostrarPantalla('pantalla-analisis');
}

function irUsuario(){
    document.getElementById('tipo_usuario').value = 'usuario';
    document.getElementById('texto-analisis').innerText = 'Modo usuario activo.';
    mostrarPantalla('pantalla-analisis');
}

function hacerRegistro(e){
    e.preventDefault();
    const u = document.getElementById('reg-username').value.trim();
    const p = document.getElementById('reg-password').value.trim();
    const usuarios = JSON.parse(localStorage.getItem('usuarios_eatburn') || '{}');
    usuarios[u] = {password: p};
    localStorage.setItem('usuarios_eatburn', JSON.stringify(usuarios));
    irLogin();
}

function hacerLogin(e){
    e.preventDefault();
    const u = document.getElementById('login-username').value.trim();
    const p = document.getElementById('login-password').value.trim();
    const usuarios = JSON.parse(localStorage.getItem('usuarios_eatburn') || '{}');
    if(usuarios[u] && usuarios[u].password === p){
        localStorage.setItem('usuario_logueado_eatburn', u);
        irUsuario();
    } else {
        alert("Usuario o contraseña incorrectos");
    }
}

function cerrarSesion(){
    localStorage.removeItem('usuario_logueado_eatburn');
    irInicio();
}

function prepararEnvio(){
    const archivo = document.getElementById('fIn').files[0] || document.getElementById('cIn').files[0];
    if(!archivo) return;

    const formData = new FormData();
    formData.append("imagen", archivo);
    formData.append("sexo", document.getElementById("sexo").value);
    formData.append("peso", document.getElementById("peso").value);
    formData.append("edad", document.getElementById("edad").value);
    formData.append("tipo_usuario", document.getElementById("tipo_usuario").value);

    document.getElementById('loading').style.display='flex';

    fetch(BACKEND_URL, { method: "POST", body: formData })
    .then(r => r.json())
    .then(data => {
        document.getElementById('loading').style.display='none';
        localStorage.setItem("resultado_eatburn", data.resultado || data.result || "Sin datos");
        window.location.href = "resultado.html";
    })
    .catch(err => {
        document.getElementById('loading').style.display='none';
        localStorage.setItem("resultado_eatburn", "Error de conexión.");
        window.location.href = "resultado.html";
    });
}

window.onload = () => {
    const u = localStorage.getItem('usuario_logueado_eatburn');
    if(u) irUsuario(); else irInicio();
};
</script>

</body>
</html>
