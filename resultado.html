<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resultado • Eat & Burn</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#ffdab9;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}
.wrapper{
    width:90%;
    max-width:360px;
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
h1{
    text-align:center;
    color:#ff4500;
    font-size:1.8rem;
}
#resultado{
    margin-top:15px;
    font-size:1rem;
    color:#3a2a1e;
    white-space:pre-wrap;
}
.btn{
    margin-top:20px;
    background:linear-gradient(180deg,#ff4500 0%,#ff8c00 50%,#ffcc00 100%);
    color:white;
    padding:12px;
    border:none;
    border-radius:18px;
    font-weight:700;
    width:100%;
    cursor:pointer;
    text-align:center;
}
</style>
</head>

<body>

<div class="wrapper">
    <h1>Resultado</h1>

    <div id="resultado">Cargando...</div>

    <button class="btn" onclick="volver()">← Volver</button>
</div>

<script>
// Cargar resultado desde localStorage
const data = localStorage.getItem("resultado_eatburn");

if(data){
    document.getElementById("resultado").textContent = data;
}else{
    document.getElementById("resultado").textContent = "No hay resultado disponible.";
}

// Volver al index
function volver(){
    window.location.href = "index.html";
}
</script>

</body>
</html>
